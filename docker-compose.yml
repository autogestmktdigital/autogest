version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: autorevenda-mysql
    restart: unless-stopped
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: autorevenda
      MYSQL_USER: autorevenda_user
      MYSQL_PASSWORD: autorevenda_pass
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  mysql_data:
